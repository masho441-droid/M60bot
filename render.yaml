services:
  - type: worker
    name: smart-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: FINNHUB_KEY
        sync: false
      - key: POLYGON_KEY
        sync: false
